<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Yield Textile Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.1/build/stlite.css"/>
  </head>
  <body style="margin: 0; background-color: #0E0E0E;">
    <div id="root"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.1/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["pandas", "numpy", "scikit-learn"],
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "app.py",
            },
          },
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
